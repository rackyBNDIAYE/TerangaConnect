<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte — TerangaConnect</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <a class="brand" href="/">Teranga<span>Connect</span></a>
  <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h16M3 12h16M3 18h16"/></svg>
  </button>
  <div class="nav-links">
    <a href="/login">Se connecter</a>
    <a href="/">Accueil</a>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">✦</div>
      <h2>Créer un compte</h2>
      <p>Rejoignez la communauté TerangaConnect</p>
    </div>
    <div class="card card-body">
      <form method="post" onsubmit="this.querySelector('.btn').classList.add('loading')">
        <div class="form-group">
          <label class="form-label">Nom d'utilisateur</label>
          <input class="form-control" name="username" placeholder="ex: bineta" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" placeholder="ex: bineta@example.com ou kyra@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input class="form-control" type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Créer mon compte →</button>
      </form>
    </div>
    <div class="auth-footer">
      Déjà un compte ? <a href="/login">Se connecter</a>
      &nbsp;·&nbsp; <a href="/">Retour</a>
    </div>
  </div>
</div>

</body>
</html>
